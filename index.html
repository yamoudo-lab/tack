<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Map App</title>
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDNtKd51uBJx4cYXoteOq72GZmq7Re4Qf0"></script>
    
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background-color: #f4f7f9; color: #333; margin: 0; padding: 20px; }
        .header { text-align: center; margin-bottom: 20px; }
        h1 { color: #06C755; margin: 0; font-size: 1.8rem; }
        #welcome { font-size: 1rem; color: #666; margin-top: 5px; }
        
        #map { height: 350px; width: 100%; border-radius: 12px; margin-bottom: 20px; display: none; border: 2px solid #06C755;}
        #memory-list { display: flex; flex-direction: column; gap: 15px; padding-bottom: 100px; }
        .memory-card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .memory-date { font-size: 0.8rem; color: #888; margin-bottom: 10px; }
        .memory-text { font-size: 1rem; line-height: 1.5; margin-bottom: 15px; white-space: pre-wrap; }
        .btn-container { display: flex; gap: 10px; flex-wrap: wrap; }
        .btn { display: inline-block; padding: 8px 15px; border-radius: 20px; font-size: 0.85rem; text-decoration: none; font-weight: bold; }
        .btn-map { background-color: #E8F5E9; color: #2E7D32; }
        .btn-img { background-color: #E3F2FD; color: #1565C0; }
        #loading { text-align: center; color: #06C755; font-weight: bold; margin-top: 30px; }

        .fab-container { position: fixed; bottom: 20px; right: 20px; display: flex; flex-direction: column; gap: 15px; z-index: 1000; align-items: flex-end;}
        .fab-sub { width: 45px; height: 45px; background-color: white; color: #333; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); cursor: pointer; border: 1px solid #ddd;}
        .fab-main { width: 65px; height: 65px; background-color: #06C755; color: white; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 35px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); cursor: pointer; }
        
        #input-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.6); z-index: 2000; justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 20px; border-radius: 12px; width: 90%; max-width: 400px; display: flex; flex-direction: column; gap: 15px; max-height: 90vh; overflow-y: auto;}
        
        /* --- 進化：Instagram風のグリッドUI --- */
        #preview-grid { display: flex; flex-wrap: wrap; gap: 10px; }
        
        /* 写真のサムネイル */
        .preview-box { width: calc(33.333% - 6.7px); aspect-ratio: 1/1; border-radius: 8px; overflow: hidden; position: relative; border: 1px solid #ddd; background: #fafafa;}
        .preview-box img { width: 100%; height: 100%; object-fit: cover; }
        .delete-btn { position: absolute; top: 4px; right: 4px; background: rgba(0,0,0,0.7); color: white; width: 22px; height: 22px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 12px; font-weight: bold; cursor: pointer; }

        /* 追加用の「＋」の枠 */
        .add-more-box { width: calc(33.333% - 6.7px); aspect-ratio: 1/1; border-radius: 8px; border: 2px dashed #ccc; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #888; cursor: pointer; background: #fafafa; transition: 0.2s;}
        .add-more-box:active { background: #eee; }
        .add-more-box span { font-size: 28px; font-weight: bold; line-height: 1; margin-bottom: 2px;}
        .add-more-box p { font-size: 0.7rem; margin: 0; font-weight: bold; }

        /* GPSとテキストエリア */
        .gps-container { display: flex; align-items: center; justify-content: space-between; background: #f8f9fa; padding: 10px 15px; border-radius: 8px; border: 1px solid #eee;}
        #gps-status { font-size: 0.9rem; font-weight: bold; }
        .btn-gps-toggle { padding: 5px 12px; font-size: 0.8rem; border-radius: 20px; border: 1px solid #ccc; background: white; cursor: pointer; color: #333;}
        textarea { width: 100%; height: 80px; border: 1px solid #ccc; border-radius: 8px; padding: 10px; font-size: 1rem; box-sizing: border-box; resize: none; }
        
        .action-btn { padding: 12px; border: none; border-radius: 8px; font-size: 1rem; font-weight: bold; cursor: pointer; }
        .btn-submit { background-color: #06C755; color: white; }
        .btn-cancel { background-color: white; color: #888; border: 1px solid #ddd;}
    </style>
</head>
<body>
    <div class="header"><h1>Memory Map</h1><div id="welcome">読み込み中...</div></div>
    <div id="map"></div>
    <div id="loading">記憶を召喚中...</div>
    <div id="memory-list"></div>

    <div class="fab-container">
        <div class="fab-sub" onclick="openTextModal()">📝</div>
        <div class="fab-main" onclick="document.getElementById('main-trigger').click()">＋</div>
    </div>

    <input type="file" id="main-trigger" accept="image/*" capture="environment" onchange="handleDirectFiles(event)" style="display: none;">

    <div id="input-modal">
        <div class="modal-content">
            
            <div id="preview-grid"></div>
            
            <div class="gps-container">
                <span id="gps-status">⏳ 取得中...</span>
                <button id="gps-toggle-btn" class="btn-gps-toggle" onclick="toggleGps()">外す</button>
            </div>
            
            <textarea id="memo-input" placeholder="ここにメモを入力..."></textarea>
            
            <button class="action-btn btn-submit" onclick="testSubmit()">🚀 送信する</button>
            <button class="action-btn btn-cancel" onclick="closeModal()">キャンセル</button>
        </div>
    </div>

    <script>
        // 【重要2】GASのURLを貼る！
        const GAS_URL = "https://script.google.com/macros/s/AKfycbxS4N8TrRihDFQJnNMjbiKYUTtCEIkX0rBqTpbxVkzUBidv-CcSi-Ym-TU9EtfPxY18/exec";
        
        let map; let bounds;
        let currentLat = null; let currentLng = null;
        let gpsEnabled = false;
        let stagingFiles = [];

        function handleDirectFiles(event) {
            const files = Array.from(event.target.files);
            if (files.length === 0) return;

            stagingFiles = stagingFiles.concat(files);
            renderPreviews();

            document.getElementById('input-modal').style.display = 'flex';
            
            if (!gpsEnabled && currentLat === null) {
                gpsEnabled = true;
                document.getElementById('gps-toggle-btn').innerText = "外す";
                getGps(); 
            }
            event.target.value = ''; // 連続で同じファイルを選べるようにリセット
        }

        function openTextModal() {
            document.getElementById('input-modal').style.display = 'flex';
            if (!gpsEnabled && currentLat === null) {
                gpsEnabled = true;
                document.getElementById('gps-toggle-btn').innerText = "外す";
                getGps(); 
            }
        }

        function closeModal() {
            document.getElementById('input-modal').style.display = 'none';
            document.getElementById('main-trigger').value = "";
            document.getElementById('memo-input').value = "";
            document.getElementById('gps-status').innerText = "未取得";
            currentLat = null; currentLng = null; gpsEnabled = false;
            stagingFiles = [];
            renderPreviews();
        }

        // 【進化】Instagram風のグリッド描画魔法
        function renderPreviews() {
            const grid = document.getElementById('preview-grid');
            grid.innerHTML = ''; // 一度全部消す
            
            // 撮った写真を順番に並べる
            stagingFiles.forEach((file, index) => {
                const box = document.createElement('div');
                box.className = 'preview-box';
                
                const img = document.createElement('img');
                const reader = new FileReader();
                reader.onload = function(e) { img.src = e.target.result; }
                reader.readAsDataURL(file);
                
                const deleteBtn = document.createElement('div');
                deleteBtn.className = 'delete-btn';
                deleteBtn.innerText = '✕';
                deleteBtn.onclick = function() { removeFile(index); };
                
                box.appendChild(img);
                box.appendChild(deleteBtn);
                grid.appendChild(box);
            });

            // 最後に、必ず「＋ 追加」の枠を置く
            const addBox = document.createElement('div');
            addBox.className = 'add-more-box';
            addBox.onclick = function() { document.getElementById('main-trigger').click(); };
            addBox.innerHTML = `<span>＋</span><p>追加</p>`;
            grid.appendChild(addBox);
        }

        function removeFile(index) {
            stagingFiles.splice(index, 1);
            renderPreviews();
        }

        function getGps() {
            if (!gpsEnabled) return;
            const statusText = document.getElementById('gps-status');
            statusText.innerText = "⏳ 取得中..."; statusText.style.color = "blue";
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    function(position) {
                        if(!gpsEnabled) return; 
                        currentLat = position.coords.latitude; currentLng = position.coords.longitude;
                        statusText.innerText = "✅ 位置情報あり"; statusText.style.color = "#06C755";
                    },
                    function(error) {
                        statusText.innerText = "❌ 取得失敗"; statusText.style.color = "red";
                        document.getElementById('gps-toggle-btn').innerText = "再取得"; gpsEnabled = false;
                    },
                    { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
                );
            }
        }

        function toggleGps() {
            const btn = document.getElementById('gps-toggle-btn');
            const statusText = document.getElementById('gps-status');
            if (gpsEnabled) {
                gpsEnabled = false; currentLat = null; currentLng = null;
                statusText.innerText = "🚫 位置情報なし"; statusText.style.color = "#888"; btn.innerText = "つける";
            } else {
                gpsEnabled = true; btn.innerText = "外す"; getGps();
            }
        }

        function testSubmit() {
            const memoText = document.getElementById('memo-input').value;
            let resultMessage = "【送信テスト：以下のデータを一括送信します】\n\n";
            resultMessage += "📷 写真枚数: " + stagingFiles.length + "枚\n";
            stagingFiles.forEach((file, i) => { resultMessage += `  - ${i+1}枚目: ${file.name}\n`; });
            resultMessage += "📍 GPS: " + (currentLat ? currentLat + ", " + currentLng : "なし") + "\n";
            resultMessage += "📝 メモ: " + (memoText ? memoText : "なし");
            alert(resultMessage);
        }

        function initMap() { map = new google.maps.Map(document.getElementById("map"), { center: { lat: 35.6895, lng: 139.6917 }, zoom: 5, mapTypeControl: false, streetViewControl: false }); bounds = new google.maps.LatLngBounds(); }
        async function fetchData() { try { const response = await fetch(GAS_URL); const data = await response.json(); document.getElementById('loading').style.display = 'none'; const listContainer = document.getElementById('memory-list'); let hasPins = false; for (let i = data.length - 1; i >= 0; i--) { const row = data[i]; const date = row[0]; const typeOrText = row[1]; const colC = row[2] || ""; const colD = row[3] || ""; const colE = row[4] || ""; if (!date || date === "日時") continue; let textToShow = ""; let mapBtnUrl = ""; let imgBtnUrl = ""; if (typeOrText === "画像") { textToShow = "📷 写真を記録しました"; if (colD.startsWith("http")) imgBtnUrl = colD; } else if (typeOrText === "位置情報") { textToShow = "📍 " + colC; if (colE) { mapBtnUrl = `https://www.google.com/maps/search/?api=1&query=${colE}`; const latLngArr = String(colE).split(","); if(latLngArr.length === 2 && map) { const position = { lat: parseFloat(latLngArr[0]), lng: parseFloat(latLngArr[1]) }; const marker = new google.maps.Marker({ position: position, map: map, title: colC }); const infoWindow = new google.maps.InfoWindow({ content: `<div style="font-size:12px; color:black;"><b>${new Date(date).toLocaleDateString('ja-JP')}</b><br>${colC}</div>` }); marker.addListener("click", () => { infoWindow.open(map, marker); }); bounds.extend(position); hasPins = true; } } else if (colD.startsWith("http")) { mapBtnUrl = colD; } } else { textToShow = typeOrText; } let cardHtml = `<div class="memory-card">`; if (date) cardHtml += `<div class="memory-date">🕒 ${new Date(date).toLocaleString('ja-JP')}</div>`; if (textToShow) cardHtml += `<div class="memory-text">${textToShow}</div>`; cardHtml += `<div class="btn-container">`; if (mapBtnUrl) cardHtml += `<a href="${mapBtnUrl}" target="_blank" class="btn btn-map">📍 地図を見る</a>`; if (imgBtnUrl) cardHtml += `<a href="${imgBtnUrl}" target="_blank" class="btn btn-img">🖼 画像を開く</a>`; cardHtml += `</div></div>`; listContainer.innerHTML += cardHtml; } if (hasPins && map) { document.getElementById("map").style.display = "block"; map.fitBounds(bounds); } } catch (error) { document.getElementById('loading').innerText = "通信エラーが発生しました: " + error; } }
        async function main() { try { if (typeof google !== 'undefined' && typeof google.maps !== 'undefined') { initMap(); } await liff.init({ liffId: "2009431992-aQfZHA0X" }); if (!liff.isLoggedIn()) { liff.login(); } else { const profile = await liff.getProfile(); document.getElementById('welcome').innerText = profile.displayName + "の記憶領域"; fetchData(); } } catch (e) { document.getElementById('welcome').innerHTML = "<span style='color:red; font-weight:bold;'>エラー発生: " + e.message + "</span>"; document.getElementById('loading').style.display = 'none'; } }
        main();
    </script>
</body>
</html>
