<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Map App</title>
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px 20px; background-color: #f4f7f9; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); display: inline-block; }
        h1 { color: #06C755; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Memory Map</h1>
        <div id="welcome">読み込み中...</div>
        <p>ここは将来、お前の記録が<br>地図と写真で並ぶ場所だ。</p>
    </div>

    <script>
        // 【重要】さっきブラウザで開いたGASのURL（https://script.google.com/.../exec）をここに貼る！
        const GAS_URL = "https://script.google.com/macros/s/AKfycbxS4N8TrRihDFQJnNMjbiKYUTtCEIkX0rBqTpbxVkzUBidv-CcSi-Ym-TU9EtfPxY18/exec";

        async function fetchData() {
            const welcomeText = document.getElementById('welcome');
            welcomeText.innerHTML += "<br><span style='font-size: 0.8em; color: gray;'>記憶を召喚中...</span>";
            
            try {
                // GASにデータを要求（Fetch）する
                const response = await fetch(GAS_URL);
                const data = await response.json();
                
                // 成功したらデータの件数を表示する
                welcomeText.innerHTML += "<br><span style='color: blue;'>召喚成功！ " + data.length + "件の記憶を取得した！</span>";
                console.log(data); // 裏側でデータを確認するための記述
            } catch (error) {
                welcomeText.innerHTML += "<br><span style='color: red;'>召喚失敗: " + error + "</span>";
            }
        }

        async function main() {
            await liff.init({ liffId: "2009431992-aQfZHA0X" }); 
            
            if (!liff.isLoggedIn()) {
                liff.login();
            } else {
                const profile = await liff.getProfile();
                document.getElementById('welcome').innerText = "ようこそ、" + profile.displayName + "！";
                
                // 挨拶のあとに、GASへのデータ要求（fetchData）を開始する
                fetchData();
            }
        }
        main();
    </script>
