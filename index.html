<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Map App</title>
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDNtKd51uBJx4cYXoteOq72GZmq7Re4Qf0"></script>
    
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background-color: #f4f7f9; color: #333; margin: 0; padding: 20px; }
        .header { text-align: center; margin-bottom: 20px; }
        h1 { color: #06C755; margin: 0; font-size: 1.8rem; }
        #welcome { font-size: 1rem; color: #666; margin-top: 5px; }
        
        #map { height: 350px; width: 100%; border-radius: 12px; margin-bottom: 20px; display: none; border: 2px solid #06C755;}
        #memory-list { display: flex; flex-direction: column; gap: 15px; padding-bottom: 80px; }
        .memory-card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .memory-date { font-size: 0.8rem; color: #888; margin-bottom: 10px; }
        .memory-text { font-size: 1rem; line-height: 1.5; margin-bottom: 15px; white-space: pre-wrap; }
        .btn-container { display: flex; gap: 10px; flex-wrap: wrap; }
        .btn { display: inline-block; padding: 8px 15px; border-radius: 20px; font-size: 0.85rem; text-decoration: none; font-weight: bold; }
        .btn-map { background-color: #E8F5E9; color: #2E7D32; }
        .btn-img { background-color: #E3F2FD; color: #1565C0; }
        #loading { text-align: center; color: #06C755; font-weight: bold; margin-top: 30px; }

        /* 右下の＋ボタン */
        #fab { position: fixed; bottom: 20px; right: 20px; width: 60px; height: 60px; background-color: #06C755; color: white; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 30px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); cursor: pointer; z-index: 1000;}
        
        /* 入力モーダル */
        #input-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.6); z-index: 2000; justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 20px; border-radius: 12px; width: 85%; max-width: 400px; display: flex; flex-direction: column; gap: 15px; }
        .modal-content h2 { margin: 0 0 5px 0; font-size: 1.2rem; color: #333; text-align: center; }
        
        /* 【進化1】写真ボタンとプレビュー */
        .photo-btn-group { display: flex; gap: 10px; }
        .photo-btn-group button { flex: 1; padding: 12px; border: none; border-radius: 8px; font-weight: bold; font-size: 0.9rem; cursor: pointer;}
        .btn-camera { background-color: #ff5a5a; color: white; }
        .btn-gallery { background-color: #f1f1f1; color: #333; }
        #photo-preview { display: none; width: 100%; max-height: 200px; object-fit: contain; border-radius: 8px; border: 1px solid #ddd; }
        
        /* 【進化2】GPS自動エリア */
        .gps-container { display: flex; align-items: center; justify-content: space-between; background: #f8f9fa; padding: 10px 15px; border-radius: 8px; border: 1px solid #eee;}
        #gps-status { font-size: 0.9rem; font-weight: bold; }
        .btn-gps-toggle { padding: 5px 12px; font-size: 0.8rem; border-radius: 20px; border: 1px solid #ccc; background: white; cursor: pointer; color: #333;}
        
        textarea { width: 100%; height: 80px; border: 1px solid #ccc; border-radius: 8px; padding: 10px; font-size: 1rem; box-sizing: border-box; resize: none; }
        .action-btn { padding: 12px; border: none; border-radius: 8px; font-size: 1rem; font-weight: bold; cursor: pointer; }
        .btn-submit { background-color: #06C755; color: white; }
        .btn-cancel { background-color: white; color: #888; border: 1px solid #ddd;}
    </style>
</head>
<body>
    <div class="header"><h1>Memory Map</h1><div id="welcome">読み込み中...</div></div>
    <div id="map"></div>
    <div id="loading">記憶を召喚中...</div>
    <div id="memory-list"></div>

    <div id="fab" onclick="openModal()">＋</div>

    <div id="input-modal">
        <div class="modal-content">
            <h2>✍️ 記憶を追加する</h2>
            
            <input type="file" id="camera-input" accept="image/*" capture="environment" onchange="previewImage(event, 'camera')" style="display: none;">
            <input type="file" id="gallery-input" accept="image/*" onchange="previewImage(event, 'gallery')" style="display: none;">
            
            <div class="photo-btn-group">
                <button class="btn-camera" onclick="document.getElementById('camera-input').click()">📷 カメラ</button>
                <button class="btn-gallery" onclick="document.getElementById('gallery-input').click()">📁 フォルダ</button>
            </div>
            <img id="photo-preview" src="" alt="プレビュー">
            
            <div class="gps-container">
                <span id="gps-status">⏳ 取得中...</span>
                <button id="gps-toggle-btn" class="btn-gps-toggle" onclick="toggleGps()">外す</button>
            </div>
            
            <textarea id="memo-input" placeholder="ここにメモを入力..."></textarea>
            
            <button class="action-btn btn-submit" onclick="testSubmit()">送信テスト</button>
            <button class="action-btn btn-cancel" onclick="closeModal()">キャンセル</button>
        </div>
    </div>

    <script>
        // 【重要2】GASのURLを貼る！（※ダブルクォーテーション " " は絶対に消さないこと！）
        const GAS_URL = "https://script.google.com/macros/s/AKfycbxS4N8TrRihDFQJnNMjbiKYUTtCEIkX0rBqTpbxVkzUBidv-CcSi-Ym-TU9EtfPxY18/exec";
        
        let map;
        let bounds;
        let currentLat = null;
        let currentLng = null;
        let gpsEnabled = true;

        function openModal() {
            document.getElementById('input-modal').style.display = 'flex';
            gpsEnabled = true;
            document.getElementById('gps-toggle-btn').innerText = "外す";
            getGps(); 
        }

        function closeModal() {
            document.getElementById('input-modal').style.display = 'none';
            document.getElementById('camera-input').value = "";
            document.getElementById('gallery-input').value = "";
            document.getElementById('photo-preview').style.display = 'none';
            document.getElementById('photo-preview').src = "";
            document.getElementById('memo-input').value = "";
            document.getElementById('gps-status').innerText = "未取得";
            currentLat = null; currentLng = null;
        }

        function previewImage(event, source) {
            const file = event.target.files[0];
            if (source === 'camera') document.getElementById('gallery-input').value = "";
            if (source === 'gallery') document.getElementById('camera-input').value = "";

            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const preview = document.getElementById('photo-preview');
                    preview.src = e.target.result;
                    preview.style.display = 'block';
                }
                reader.readAsDataURL(file);
            }
        }

        function getGps() {
            if (!gpsEnabled) return;
            const statusText = document.getElementById('gps-status');
            statusText.innerText = "⏳ 取得中..."; statusText.style.color = "blue";

            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    function(position) {
                        if(!gpsEnabled) return; 
                        currentLat = position.coords.latitude;
                        currentLng = position.coords.longitude;
                        statusText.innerText = "✅ 位置情報あり"; statusText.style.color = "#06C755";
                    },
                    function(error) {
                        statusText.innerText = "❌ 取得失敗"; statusText.style.color = "red";
                        document.getElementById('gps-toggle-btn').innerText = "再取得";
                        gpsEnabled = false;
                    },
                    { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
                );
            }
        }

        function toggleGps() {
            const btn = document.getElementById('gps-toggle-btn');
            const statusText = document.getElementById('gps-status');

            if (gpsEnabled) {
                gpsEnabled = false;
                currentLat = null; currentLng = null;
                statusText.innerText = "🚫 位置情報なし"; statusText.style.color = "#888";
                btn.innerText = "追加する";
            } else {
                gpsEnabled = true;
                btn.innerText = "外す";
                getGps();
            }
        }

        function testSubmit() {
            const photoFile = document.getElementById('camera-input').files[0] || document.getElementById('gallery-input').files[0];
            const memoText = document.getElementById('memo-input').value;
            
            let resultMessage = "【取得データ確認】\n\n";
            resultMessage += "📷 写真: " + (photoFile ? photoFile.name : "なし") + "\n";
            resultMessage += "📍 GPS: " + (currentLat ? currentLat + ", " + currentLng : "なし") + "\n";
            resultMessage += "📝 メモ: " + (memoText ? memoText : "なし");
            alert(resultMessage);
        }

        function initMap() { 
            map = new google.maps.Map(document.getElementById("map"), { 
                center: { lat: 35.6895, lng: 139.6917 }, 
                zoom: 5, 
                mapTypeControl: false, 
                streetViewControl: false 
            }); 
            bounds = new google.maps.LatLngBounds(); 
        }

        async function fetchData() { 
            try { 
                const response = await fetch(GAS_URL); 
                const data = await response.json(); 
                document.getElementById('loading').style.display = 'none'; 
                const listContainer = document.getElementById('memory-list'); 
                let hasPins = false; 

                for (let i = data.length - 1; i >= 0; i--) { 
                    const row = data[i]; 
                    const date = row[0]; const typeOrText = row[1]; const colC = row[2] || ""; const colD = row[3] || ""; const colE = row[4] || ""; 
                    if (!date || date === "日時") continue; 

                    let textToShow = ""; let mapBtnUrl = ""; let imgBtnUrl = ""; 
                    
                    if (typeOrText === "画像") { 
                        textToShow = "📷 写真を記録しました"; 
                        if (colD.startsWith("http")) imgBtnUrl = colD; 
                    } else if (typeOrText === "位置情報") { 
                        textToShow = "📍 " + colC; 
                        if (colE) { 
                            // マップURLの生成バグもついでに公式のフォーマットに完全修正しておいた！
                            mapBtnUrl = `https://www.google.com/maps/search/?api=1&query=${colE}`; 
                            const latLngArr = String(colE).split(","); 
                            if(latLngArr.length === 2 && map) { 
                                const position = { lat: parseFloat(latLngArr[0]), lng: parseFloat(latLngArr[1]) }; 
                                const marker = new google.maps.Marker({ position: position, map: map, title: colC }); 
                                const infoWindow = new google.maps.InfoWindow({ content: `<div style="font-size:12px; color:black;"><b>${new Date(date).toLocaleDateString('ja-JP')}</b><br>${colC}</div>` }); 
                                marker.addListener("click", () => { infoWindow.open(map, marker); }); 
                                bounds.extend(position); hasPins = true; 
                            } 
                        } else if (colD.startsWith("http")) {
                            mapBtnUrl = colD; 
                        }
                    } else { 
                        textToShow = typeOrText; 
                    } 
                    
                    let cardHtml = `<div class="memory-card">`; 
                    if (date) cardHtml += `<div class="memory-date">🕒 ${new Date(date).toLocaleString('ja-JP')}</div>`; 
                    if (textToShow) cardHtml += `<div class="memory-text">${textToShow}</div>`; 
                    cardHtml += `<div class="btn-container">`; 
                    if (mapBtnUrl) cardHtml += `<a href="${mapBtnUrl}" target="_blank" class="btn btn-map">📍 地図を見る</a>`; 
                    if (imgBtnUrl) cardHtml += `<a href="${imgBtnUrl}" target="_blank" class="btn btn-img">🖼 画像を開く</a>`; 
                    cardHtml += `</div></div>`; 
                    listContainer.innerHTML += cardHtml; 
                } 
                if (hasPins && map) { 
                    document.getElementById("map").style.display = "block"; 
                    map.fitBounds(bounds); 
                } 
            } catch (error) { 
                document.getElementById('loading').innerText = "通信エラーが発生しました: " + error; 
            } 
        }

        async function main() { 
            try {
                // Google Mapsの読み込みチェックを強化
                if (typeof google !== 'undefined' && typeof google.maps !== 'undefined') {
                    initMap(); 
                }
                
                await liff.init({ liffId: "2009431992-aQfZHA0X" }); 
                if (!liff.isLoggedIn()) { 
                    liff.login(); 
                } else { 
                    const profile = await liff.getProfile(); 
                    document.getElementById('welcome').innerText = profile.displayName + "の記憶領域"; 
                    fetchData(); 
                } 
            } catch (e) {
                // エラーが起きたら画面に赤文字で原因を叫ぶ最強の装甲
                document.getElementById('welcome').innerHTML = "<span style='color:red; font-weight:bold;'>エラー発生: " + e.message + "</span>";
                document.getElementById('loading').style.display = 'none';
            }
        }
        
        main();
    </script>
