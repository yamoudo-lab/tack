<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Map App</title>
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px 20px; background-color: #f4f7f9; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); display: inline-block; }
        h1 { color: #06C755; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Memory Map</h1>
        <div id="welcome">読み込み中...</div>
        <p>ここは将来、お前の記録が<br>地図と写真で並ぶ場所だ。</p>
    </div>

    <script>
        async function main() {
            // お前のLIFF IDで初期化
            await liff.init({ liffId: "2009431992-aQfZHA0X" }); 
            
            if (!liff.isLoggedIn()) {
                liff.login(); // ログインしてなければログイン画面へ
            } else {
                const profile = await liff.getProfile();
                document.getElementById('welcome').innerText = "ようこそ、" + profile.displayName + "！";
            }
        }
        main();
    </script>
</body>
</html>
